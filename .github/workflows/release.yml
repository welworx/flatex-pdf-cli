name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir dist
          for t in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            os=${t%/*}; arch=${t#*/}; ext=""; [ "$os" = windows ] && ext=".exe"
            GOOS=$os GOARCH=$arch go build -ldflags="-X main.version=$VERSION" \
              -o "dist/flatex-pdf-cli_${os}_${arch}${ext}" .
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
