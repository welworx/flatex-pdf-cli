name: CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go fmt ./...
      - run: go vet ./...
      - run: golangci-lint run  # requires installation
      - run: go test -v -race ./...
      - run: go build -o flatex-pdf-cli
  build-release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: GOOS=linux GOARCH=amd64 go build -o flatex-pdf-cli-linux-amd64
      - run: GOOS=darwin GOARCH=amd64 go build -o flatex-pdf-cli-darwin-amd64
      - run: GOOS=windows GOARCH=amd64 go build -o flatex-pdf-cli-windows-amd64.exe
      - uses: softprops/action-gh-release@v1
        with:
          files: flatex-pdf-cli-*
