name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go build -o flatex-pdf-cli
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
  build-release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: GOOS=linux GOARCH=amd64 go build -o flatex-pdf-cli-linux-amd64
      - run: GOOS=darwin GOARCH=amd64 go build -o flatex-pdf-cli-darwin-amd64
      - run: GOOS=windows GOARCH=amd64 go build -o flatex-pdf-cli-windows-amd64.exe
      - uses: softprops/action-gh-release@v1
        with:
          files: flatex-pdf-cli-*
